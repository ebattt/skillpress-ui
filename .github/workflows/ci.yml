name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: npm ci
      - name: install font build tools
        run: pip install -r tools/requirements-fonts.txt
      - name: aggregate check
        run: npm run check
      - name: generated artifacts are committed
        run: git diff --exit-code
      - name: build storybook (smoke)
        run: npm run build-storybook --if-present
      - name: upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundles
          path: dist/
          retention-days: 7
