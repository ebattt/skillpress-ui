<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillpress UI — Accordion Section</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="../../bundles/demo-minimal.css">
</head>
<body>
    <main class="px-4 py-8">
        <section aria-labelledby="accordion-demo-title">
            <h1 id="accordion-demo-title" class="text-3xl font-bold tracking-tight">Accordion Section</h1>

            <div class="accordion" data-accordion>
                <section class="accordion__section" data-accordion-section>
                    <button class="accordion__header" type="button" data-accordion-trigger aria-expanded="false">
                        <span class="accordion__header-left">
                            <span class="accordion__badge">1</span>
                            <span class="accordion__title">Accordion Section</span>
                        </span>
                        <span
                            class="material-symbols-outlined accordion__icon"
                            data-accordion-icon
                            data-icon-open="remove"
                            data-icon-closed="add"
                            aria-hidden="true"
                        >add</span>
                    </button>

                    <div class="accordion__content">
                        <div class="accordion__inner"></div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="../../js/accordion.js"></script>
</body>
</html>
